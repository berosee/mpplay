<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>mpplay - Final Stable</title>
  <style>
    :root {
      --neon-blue: #00d2ff;
      --deep-blue: #4a7cff;
    }

    html, body { 
      height: 100%; margin: 0; padding: 0; 
      overflow: hidden; background: #121212; 
    }

    body {
      font-family: 'Pretendard', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .fixed-header {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #121212;
      z-index: 100;
      padding-bottom: 5px;
      flex-shrink: 0;
    }

    .nav, .player-card, .playlist-wrapper {
      width: 92%;
      max-width: 360px;
    }

    .nav {
      display: flex; gap: 4px; margin: 10px 0;
      background: rgba(255,255,255,0.05); padding: 4px; border-radius: 50px;
    }
    .nav a {
      flex: 1; text-decoration: none; color: rgba(255, 255, 255, 0.4);
      padding: 8px 0; text-align: center; border-radius: 25px; font-size: 11px; font-weight: bold;
    }
    .nav a.active { background: var(--deep-blue); color: #fff; box-shadow: 0 0 10px var(--deep-blue); }

    .player-card {
      background: #0f172a;
      border-radius: 20px; padding: 15px 18px;
      text-align: center; border: 1px solid rgba(0, 210, 255, 0.2);
    }

    .song-info .title { font-size: 16px; font-weight: bold; margin-bottom: 12px; height: 1.2em; overflow: hidden; }
    .status-row { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 12px; }
    .time-display { font-size: 20px; font-family: 'Arial', sans-serif; }
    .bar-container { display: flex; gap: 3px; align-items: flex-end; height: 16px; }
    .bar { width: 3px; background: var(--neon-blue); border-radius: 1px; height: 4px; }
    .bar.playing { animation: bounce 0.6s ease-in-out infinite alternate; }
    @keyframes bounce { from { height: 4px; } to { height: 16px; } }

    .progress-container { width: 100%; cursor: pointer; padding: 5px 0; margin-bottom: 10px; }
    .progress-bg { height: 2px; background: rgba(255, 255, 255, 0.1); }
    .progress-fill { width: 0%; height: 100%; background: var(--neon-blue); }

    .controls { display: flex; justify-content: center; align-items: center; gap: 20px; }
    .btn-play-box { 
      border: 1.5px solid #fff; border-radius: 10px;
      width: 50px; height: 42px; display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }

    .playlist-wrapper { 
      flex: 1; 
      overflow-y: auto; 
      background: rgba(0,0,0,0.3); 
      border-radius: 15px 15px 0 0;
      -webkit-overflow-scrolling: touch;
      margin-top: 5px;
    }
    
    .playlist-table { width: 100%; border-collapse: collapse; }
    .playlist-table td { 
      padding: 13px 18px; 
      font-size: 14px; 
      border-bottom: 1px solid rgba(255,255,255,0.03); 
      color: #999; cursor: pointer; 
    }
    
    .playlist-table tr.active td { 
      color: var(--neon-blue); 
      font-weight: bold; 
      background: rgba(0, 210, 255, 0.12); 
    }
  </style>
</head>
<body>

<div class="fixed-header">
  <div class="nav">
    <a href="?cat=old" id="nav-old">OLD</a>
    <a href="?cat=enka" id="nav-enka">ENKA</a>
    <a href="?cat=jazz" id="nav-jazz">JAZZ</a>
  </div>

  <div class="player-card">
    <div class="song-info"><div class="title" id="labelTitle">곡을 선택해 주세요</div></div>
    <div class="status-row">
      <div class="bar-container" id="visualizer">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
      <div class="time-display"><span id="curTime">00:00</span> / <span id="durTime">00:00</span></div>
    </div>
    <div class="progress-container" id="progArea">
      <div class="progress-bg"><div class="progress-fill" id="progFill"></div></div>
    </div>
    <div class="controls">
      <button style="background:none;border:none;color:#4b5563;font-size:20px;cursor:pointer;" id="btnPrev">⏮</button>
      <div class="btn-play-box" id="btnPlayWrap"><span id="btnIcon" style="color:var(--neon-blue);font-size:24px;">▶</span></div>
      <button style="background:none;border:none;color:#4b5563;font-size:20px;cursor:pointer;" id="btnNext">⏭</button>
    </div>
  </div>
</div>

<div class="playlist-wrapper" id="scrollContainer">
  <table class="playlist-table" id="listTable"></table>
</div>

<script>
const playlists = {
    "enka": [
         { "title": "Four Seasons 'Autumn'- Allegro (La Caccia)", "url": "music/enka/Four Seasons 'Autumn'-  Allegro (La Caccia).mp3" },
         { "title": "Four Seasons 'Autumn'- Adagio", "url": "music/enka/Four Seasons 'Autumn'- Adagio.mp3" },
         { "title": "Four Seasons 'Autumn'- Allegro", "url": "music/enka/Four Seasons 'Autumn'- Allegro.mp3" },
         { "title": "Four Seasons 'Spring'- Allegro (danza pastorale)", "url": "music/enka/Four Seasons 'Spring'- Allegro (danza pastorale).mp3" },
         { "title": "Four Seasons 'Spring'- Allegro", "url": "music/enka/Four Seasons 'Spring'- Allegro.mp3" },
         { "title": "Four Seasons 'Spring'- Largo e pianissimo", "url": "music/enka/Four Seasons 'Spring'- Largo e pianissimo.mp3" },
         { "title": "Four Seasons 'Summer'- Adagio, presto", "url": "music/enka/Four Seasons 'Summer'-  Adagio, presto.mp3" },
         { "title": "Four Seasons 'Summer'- Presto (tempo impetuoso)", "url": "music/enka/Four Seasons 'Summer'-  Presto (tempo impetuoso).mp3" },
         { "title": "Four Seasons 'Summer'- Allegro non molto", "url": "music/enka/Four Seasons 'Summer'- Allegro non molto.mp3" },
         { "title": "Four Seasons 'Winter'- Allegro non molto", "url": "music/enka/Four Seasons 'Winter'- Allegro non molto.mp3" },
         { "title": "Four Seasons 'Winter'- Allegro", "url": "music/enka/Four Seasons 'Winter'- Allegro.mp3" },
          { "title": "Four Seasons 'Spring'- Allegro", "url": "music/enka/Four Seasons 'Spring'- Allegro.mp3" },
         { "title": "Four Seasons 'Spring'- Largo e pianissimo", "url": "music/enka/Four Seasons 'Spring'- Largo e pianissimo.mp3" },
         { "title": "Four Seasons 'Summer'- Adagio, presto", "url": "music/enka/Four Seasons 'Summer'-  Adagio, presto.mp3" },
         { "title": "Four Seasons 'Summer'- Presto (tempo impetuoso)", "url": "music/enka/Four Seasons 'Summer'-  Presto (tempo impetuoso).mp3" },
         { "title": "Four Seasons 'Summer'- Allegro non molto", "url": "music/enka/Four Seasons 'Summer'- Allegro non molto.mp3" },
         { "title": "Four Seasons 'Winter'- Allegro non molto", "url": "music/enka/Four Seasons 'Winter'- Allegro non molto.mp3" },
         { "title": "Four Seasons 'Winter'- Allegro", "url": "music/enka/Four Seasons 'Winter'- Allegro.mp3" },
         { "title": "Four Seasons 'Winter'- Largo", "url": "music/enka/Four Seasons 'Winter'- Largo.mp3" }
    ],
    "jazz": [
        { "title": "금잔디 - 고장난벽시계", "url": "music/jazz/금잔디 - 고장난벽시계.mp3" },
        { "title": "금잔디 - 남자라는이유로", "url": "music/jazz/금잔디 - 남자라는이유로.mp3" },
        { "title": "금잔디 - 네박자", "url": "music/jazz/금잔디 - 네박자.mp3" },
        { "title": "금잔디 - 안동역에서", "url": "music/jazz/금잔디 - 안동역에서.mp3" },
        { "title": "금잔디 - 일편단심", "url": "music/jazz/금잔디 - 일편단심.mp3" }
    
    ],
    "old": [
        { "title": "Mary Duff - Will You Walk With Me", "url": "music/old/Mary Duff - Will You Walk With Me.mp3" },
        { "title": "Beyonce - TEXAS HOLD EM", "url": "music/old/Beyonce - TEXAS HOLD EM.mp3" },
        { "title": "Bobby Darin - Early In The Morning", "url": "music/old/Bobby Darin - Early In The Morning.mp3" },
        { "title": "Daniel - Blackboard of My Heart", "url": "music/old/Daniel - Blackboard of My Heart.mp3" },
        { "title": "Isla Grant - Only Yesterday", "url": "music/old/Isla Grant - Only Yesterday.mp3" },
        { "title": "Jonny Cash - Cotton Fields", "url": "music/old/Jonny Cash - Cotton Fields.mp3" },
        { "title": "The Carpenters - Yesterday Once More", "url": "music/old/The Carpenters - Yesterday Once More.mp3" },
         { "title": "Andy Williams - Love Is Blue", "url": "music/jazz/Andy Williams - Love Is Blue.flac" },
        { "title": "The Beatles - Yesterday", "url": "music/jazz/The Beatles - Yesterday.flac" }
    ]
};

const params = new URLSearchParams(window.location.search);
const curCat = params.get("cat") || "old";
const curList = playlists[curCat] || playlists["old"];

document.getElementById("nav-" + curCat).classList.add("active");

const audio = new Audio();
let curIdx = 0;
let isLoaded = false;

const listTable = document.getElementById("listTable");
const scrollContainer = document.getElementById("scrollContainer");

curList.forEach((song, i) => {
  const tr = document.createElement("tr");
  tr.innerHTML = `<td>${song.title}</td>`;
  tr.onclick = () => playSong(i);
  listTable.appendChild(tr);
});

function formatTime(sec) {
  if (!sec || isNaN(sec)) return "00:00";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m.toString().padStart(2, '0') + ":" + s.toString().padStart(2, '0');
}

function playSong(i) {
  curIdx = i;
  isLoaded = true;
  audio.src = curList[curIdx].url;
  audio.play().catch(e => console.log("재생 차단됨"));
  document.getElementById("labelTitle").textContent = curList[curIdx].title;
  updateUI();
}

function updateUI() {
  const rows = document.querySelectorAll("#listTable tr");
  rows.forEach((row, k) => {
    row.classList.toggle("active", k === curIdx);
    if (k === curIdx) {
      setTimeout(() => {
        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 50);
    }
  });
}

document.getElementById("btnPlayWrap").onclick = () => {
  if (!isLoaded) playSong(0);
  else audio.paused ? audio.play() : audio.pause();
};

audio.ontimeupdate = () => {
  if (audio.duration) {
    document.getElementById("curTime").textContent = formatTime(audio.currentTime);
    document.getElementById("durTime").textContent = formatTime(audio.duration);
    document.getElementById("progFill").style.width = (audio.currentTime / audio.duration * 100) + "%";
  }
};

audio.onloadedmetadata = () => {
  document.getElementById("durTime").textContent = formatTime(audio.duration);
};

audio.onplay = () => {
  document.getElementById("btnIcon").textContent = "Ⅱ";
  document.querySelectorAll(".bar").forEach(b => b.classList.add("playing"));
};
audio.onpause = () => {
  document.getElementById("btnIcon").textContent = "▶";
  document.querySelectorAll(".bar").forEach(b => b.classList.remove("playing"));
};

audio.onended = () => document.getElementById("btnNext").onclick();
document.getElementById("btnNext").onclick = () => playSong((curIdx + 1) % curList.length);
document.getElementById("btnPrev").onclick = () => playSong((curIdx - 1 + curList.length) % curList.length);

document.getElementById("progArea").onclick = (e) => {
  if (audio.duration) {
    audio.currentTime = (e.offsetX / document.getElementById("progArea").clientWidth) * audio.duration;
  }
};
</script>
</body>
</html>
