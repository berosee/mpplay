<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>mpplay - Optimized</title>
  <style>
    :root {
      --neon-blue: #00d2ff;
      --deep-blue: #4a7cff;
    }

    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #121212; }

    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .fixed-header {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #121212;
      z-index: 100;
      padding-bottom: 5px;
      flex-shrink: 0;
    }

    .nav, .player-card, .playlist-wrapper {
      width: 92%;
      max-width: 360px;
    }

    .nav {
      display: flex; gap: 4px; margin: 10px 0;
      background: rgba(255,255,255,0.05); padding: 4px; border-radius: 50px;
    }
    .nav a {
      flex: 1; text-decoration: none; color: rgba(255, 255, 255, 0.4);
      padding: 8px 0; text-align: center; border-radius: 25px; font-size: 11px; font-weight: bold;
    }
    .nav a.active { background: var(--deep-blue); color: #fff; box-shadow: 0 0 10px var(--deep-blue); }

    .player-card {
      background: #0f172a;
      border-radius: 20px; padding: 15px 18px;
      text-align: center; border: 1px solid rgba(0, 210, 255, 0.2);
    }

    .song-info .title { 
      font-size: 15px; /* 약간 축소하여 세련되게 */
      font-weight: bold; 
      margin-bottom: 12px; 
      height: 1.2em; 
      overflow: hidden; 
      color: var(--neon-blue);
    }

    .status-row { 
      display: flex; 
      justify-content: space-between; /* 양쪽 끝으로 배치하여 구도 개선 */
      align-items: center; 
      padding: 0 5px;
      margin-bottom: 12px; 
    }

    /* [중요] 타임코드 폰트 축소 및 스타일 수정 */
    .time-display { 
      font-size: 13px; /* 20px -> 13px로 축소 */
      font-family: 'Consolas', monospace; /* 숫자가 변해도 폭이 일정한 폰트 */
      color: #888;
    }

    .bar-container { display: flex; gap: 3px; align-items: flex-end; height: 14px; }
    .bar { width: 3px; background: var(--neon-blue); border-radius: 1px; height: 4px; }
    .bar.playing { animation: bounce 0.6s ease-in-out infinite alternate; }
    @keyframes bounce { from { height: 4px; } to { height: 14px; } }

    .progress-container { width: 100%; cursor: pointer; padding: 5px 0; margin-bottom: 10px; }
    .progress-bg { height: 2px; background: rgba(255, 255, 255, 0.1); }
    .progress-fill { width: 0%; height: 100%; background: var(--neon-blue); }

    .controls { display: flex; justify-content: center; align-items: center; gap: 30px; }
    .btn-play-box { 
      border: 1.5px solid var(--neon-blue); /* 테두리 색상 통일 */
      border-radius: 50%; /* 원형으로 변경하여 더 현대적인 느낌 */
      width: 46px; height: 46px; display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }

    .playlist-wrapper { 
      flex: 1; 
      overflow-y: auto; 
      background: rgba(0,0,0,0.3); 
      border-radius: 15px 15px 0 0;
      -webkit-overflow-scrolling: touch;
      margin-top: 10px;
    }    
    .playlist-table { width: 100%; border-collapse: collapse; }
    .playlist-table td { 
      padding: 10px 18px; 
      font-size: 14px; 
      border-bottom: 1px solid rgba(255,255,255,0.03); 
      color: #999; cursor: pointer; 
    }    
    .playlist-table tr.active td { 
      color: var(--neon-blue); 
      font-weight: bold; 
      background: rgba(0, 210, 255, 0.1); 
    }
  </style>
</head>
<body>

<div class="fixed-header">
  <div class="nav">
    <a href="?cat=old" id="nav-old">OLD</a>
    <a href="?cat=enka" id="nav-enka">ENKA</a>
    <a href="?cat=jazz" id="nav-jazz">JAZZ</a>
  </div>

  <div class="player-card">
    <div class="song-info"><div class="title" id="labelTitle">곡을 선택해 주세요</div></div>
    <div class="status-row">
      <div class="bar-container" id="visualizer">
        <div class="bar"></div><div class="bar"></div><div class="bar-playing bar"></div><div class="bar"></div>
      </div>
      <div class="time-display"><span id="curTime">00:00</span> / <span id="durTime">00:00</span></div>
    </div>
    <div class="progress-container" id="progArea">
      <div class="progress-bg"><div class="progress-fill" id="progFill"></div></div>
    </div>
    <div class="controls">
      <button style="background:none;border:none;color:#666;font-size:20px;cursor:pointer;" id="btnPrev">⏮</button>
      <div class="btn-play-box" id="btnPlayWrap"><span id="btnIcon" style="color:var(--neon-blue);font-size:20px;">▶</span></div>
      <button style="background:none;border:none;color:#666;font-size:20px;cursor:pointer;" id="btnNext">⏭</button>
    </div>
  </div>
</div>

<div class="playlist-wrapper" id="scrollContainer">
  <table class="playlist-table" id="listTable"></table>
</div>

const params = new URLSearchParams(window.location.search);
const curCat = params.get("cat") || "old";
const curList = playlists[curCat] || playlists["old"];

document.getElementById("nav-" + curCat).classList.add("active");

const audio = new Audio();
let curIdx = 0;
let isLoaded = false;

const listTable = document.getElementById("listTable");
const scrollContainer = document.getElementById("scrollContainer");

curList.forEach((song, i) => {
  const tr = document.createElement("tr");
  tr.innerHTML = `<td>${song.title}</td>`;
  tr.onclick = () => playSong(i);
  listTable.appendChild(tr);
});

function formatTime(sec) {
  if (!sec || isNaN(sec)) return "00:00";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m.toString().padStart(2, '0') + ":" + s.toString().padStart(2, '0');
}

function playSong(i) {
  curIdx = i;
  isLoaded = true;
  audio.src = curList[curIdx].url;
  audio.play().catch(e => console.log("재생 차단됨"));
  document.getElementById("labelTitle").textContent = curList[curIdx].title;
  updateUI();
}

function updateUI() {
  const rows = document.querySelectorAll("#listTable tr");
  rows.forEach((row, k) => {
    row.classList.toggle("active", k === curIdx);
    if (k === curIdx) {
      setTimeout(() => {
        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 50);
    }
  });
}

document.getElementById("btnPlayWrap").onclick = () => {
  if (!isLoaded) playSong(0);
  else audio.paused ? audio.play() : audio.pause();
};

audio.ontimeupdate = () => {
  if (audio.duration) {
    document.getElementById("curTime").textContent = formatTime(audio.currentTime);
    document.getElementById("durTime").textContent = formatTime(audio.duration);
    document.getElementById("progFill").style.width = (audio.currentTime / audio.duration * 100) + "%";
  }
};

audio.onloadedmetadata = () => {
  document.getElementById("durTime").textContent = formatTime(audio.duration);
};

audio.onplay = () => {
  document.getElementById("btnIcon").textContent = "Ⅱ";
  document.querySelectorAll(".bar").forEach(b => b.classList.add("playing"));
};
audio.onpause = () => {
  document.getElementById("btnIcon").textContent = "▶";
  document.querySelectorAll(".bar").forEach(b => b.classList.remove("playing"));
};

audio.onended = () => document.getElementById("btnNext").onclick();
document.getElementById("btnNext").onclick = () => playSong((curIdx + 1) % curList.length);
document.getElementById("btnPrev").onclick = () => playSong((curIdx - 1 + curList.length) % curList.length);

document.getElementById("progArea").onclick = (e) => {
  if (audio.duration) {
    audio.currentTime = (e.offsetX / document.getElementById("progArea").clientWidth) * audio.duration;
  }
};
</script>
