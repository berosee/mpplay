<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>mpplay - Sticky Player</title>
  <style>
    :root {
      --neon-blue: #00d2ff;
      --deep-blue: #4a7cff;
    }

    /* 전체 화면 설정 */
    html, body { 
      height: 100%; margin: 0; padding: 0; 
      overflow: hidden; background: #121212; 
    }

    body {
      font-family: 'Pretendard', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* [고정 영역] 네비게이션과 플레이어를 묶는 컨테이너 */
    .fixed-header {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #121212; /* 배경색과 동일하게 맞춰 리스트가 뒤로 숨게 함 */
      z-index: 100; /* 리스트보다 항상 위에 있게 설정 */
      padding-bottom: 5px;
      flex-shrink: 0;
    }

    .nav, .player-card {
      width: 92%;
      max-width: 360px;
    }

    /* 네비게이션 스타일 */
    .nav {
      display: flex; gap: 4px; margin: 10px 0;
      background: rgba(255,255,255,0.05); padding: 4px; border-radius: 50px;
    }
    .nav a {
      flex: 1; text-decoration: none; color: rgba(255, 255, 255, 0.4);
      padding: 8px 0; text-align: center; border-radius: 25px; font-size: 11px; font-weight: bold;
    }
    .nav a.active { background: var(--deep-blue); color: #fff; box-shadow: 0 0 10px var(--deep-blue); }

    /* 플레이어 카드 (안내판) */
    .player-card {
      background: #0f172a;
      border-radius: 20px; padding: 15px 18px;
      text-align: center; border: 1px solid rgba(0, 210, 255, 0.2);
    }

    .song-info .title { font-size: 16px; font-weight: bold; margin-bottom: 12px; height: 1.2em; overflow: hidden; }
    .status-row { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 12px; }
    .time-display { font-size: 20px; font-family: 'Arial', sans-serif; }
    .bar-container { display: flex; gap: 3px; align-items: flex-end; height: 16px; }
    .bar { width: 3px; background: var(--neon-blue); border-radius: 1px; height: 4px; }
    .bar.playing { animation: bounce 0.6s ease-in-out infinite alternate; }
    @keyframes bounce { from { height: 4px; } to { height: 16px; } }

    .progress-container { width: 100%; cursor: pointer; padding: 5px 0; margin-bottom: 10px; }
    .progress-bg { height: 2px; background: rgba(255, 255, 255, 0.1); }
    .progress-fill { width: 0%; height: 100%; background: var(--neon-blue); }

    .controls { display: flex; justify-content: center; align-items: center; gap: 20px; }
    .btn-play-box { 
      border: 1.5px solid #fff; border-radius: 10px;
      width: 50px; height: 42px; display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }

    /* [스크롤 영역] 곡명 리스트 */
    .playlist-wrapper { 
      flex: 1; 
      width: 92%;
      max-width: 360px;
      overflow-y: auto; 
      background: rgba(0,0,0,0.3); 
      border-radius: 15px 15px 0 0;
      -webkit-overflow-scrolling: touch;
      margin-top: 5px;
    }
    
    .playlist-table { width: 100%; border-collapse: collapse; }
    .playlist-table td { 
      padding: 13px 18px; 
      font-size: 14px; 
      border-bottom: 1px solid rgba(255,255,255,0.03); 
      color: #999; cursor: pointer; 
    }
    
    .playlist-table tr.active td { 
      color: var(--neon-blue); 
      font-weight: bold; 
      background: rgba(0, 210, 255, 0.12); 
    }
  </style>
</head>
<body>

<div class="fixed-header">
  <div class="nav">
    <a href="?cat=old" id="nav-old">OLD</a>
    <a href="?cat=enka" id="nav-enka">ENKA</a>
    <a href="?cat=jazz" id="nav-jazz">JAZZ</a>
  </div>

  <div class="player-card">
    <div class="song-info"><div class="title" id="labelTitle">곡을 선택해 주세요</div></div>
    <div class="status-row">
      <div class="bar-container" id="visualizer">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
      <div class="time-display"><span id="curTime">00:00</span> / <span id="durTime">00:00</span></div>
    </div>
    <div class="progress-container" id="progArea">
      <div class="progress-bg"><div class="progress-fill" id="progFill"></div></div>
    </div>
    <div class="controls">
      <button style="background:none;border:none;color:#4b5563;font-size:20px;cursor:pointer;" id="btnPrev">⏮</button>
      <div class="btn-play-box" id="btnPlayWrap"><span id="btnIcon" style="color:var(--neon-blue);font-size:24px;">▶</span></div>
      <button style="background:none;border:none;color:#4b5563;font-size:20px;cursor:pointer;" id="btnNext">⏭</button>
    </div>
  </div>
</div>

<div class="playlist-wrapper" id="scrollContainer">
  <table class="playlist-table" id="listTable"></table>
</div>


<script>
const playlists = {
    "enka": [

        },
        {

            "url": "music/enka/Four Seasons 'Autumn'- Allegro.mp3"
        },
        {

            "url": "music/enka/Four Seasons 'Spring'- Allegro (danza pastorale).mp3"
        },
        {
            "title": "Four Seasons 'Spring'- Allegro",
            "url": "music/enka/Four Seasons 'Spring'- Allegro.mp3"
        },
        {
            "title": "Four Seasons 'Spring'- Largo e pianissimo",
            "url": "music/enka/Four Seasons 'Spring'- Largo e pianissimo.mp3"
        },
        {
            "title": "Four Seasons 'Summer'-  Adagio, presto",
            "url": "music/enka/Four Seasons 'Summer'-  Adagio, presto.mp3"
        },
        {
            "title": "Four Seasons 'Summer'-  Presto (tempo impetuoso)",
            "url": "music/enka/Four Seasons 'Summer'-  Presto (tempo impetuoso).mp3"
        },
        {

            "url": "music/enka/Four Seasons 'Summer'- Allegro non molto.mp3"
        },
        {

        },
        {
            "title": "Four Seasons 'Winter'- Largo",

        }
    ],
    "jazz": [
        {
            "title": "금잔디 - 고장난벽시계",
            "url": "music/jazz/금잔디 - 고장난벽시계.mp3"
        },
        {

        },
        {

            "url": "music/jazz/금잔디 - 네박자.mp3"
        },
        {
            "title": "금잔디 - 안동역에서",
            "url": "music/jazz/금잔디 - 안동역에서.mp3"
        },
        {
            "title": "금잔디 - 일편단심",
            "url": "music/jazz/금잔디 - 일편단심.mp3"
        }
    ],
    "old": [
         {
            "title": "Mary Duff - Will You Walk With Me",
            "url": "music/old/Mary Duff - Will You Walk With Me.mp3"
        },
        {

        },
        {

        },
        {

        },
        {

            "url": "music/old/Daniel - Pretty Little Girl From Omagh.mp3"
        },
        {
            "title": "Isla Grant - Every Moment Of Every Hour",
            "url": "music/old/Isla Grant - Every Moment Of Every Hour.mp3"
        },
        {
            "title": "Isla Grant - Only Yesterday",
            "url": "music/old/Isla Grant - Only Yesterday.mp3"
        },
        {
            "title": "Jonny Cash - Cotton Fields",
            "url": "music/old/Jonny Cash - Cotton Fields.mp3"
        },
        {
            "title": "Mary Duff - Just Lovin' You",
            "url": "music/old/Mary Duff - Just Lovin' You.mp3"
        },
        {
            "title": "Mary Duff - Power Of Love",
            "url": "music/old/Mary Duff - Power Of Love.mp3"
        },
        {
            "title": "The Carpenters - Yesterday Once More",
            "url": "music/old/The Carpenters - Yesterday Once More.mp3"
        },
         {
            "title": "dave - The Happy Organ",
            "url": "music/old/dave - The Happy Organ.flac"
        }
    ]
};
const params = new URLSearchParams(window.location.search);
const curCat = params.get("cat") || "old";
const curList = playlists[curCat] || playlists["old"];

document.getElementById("nav-" + curCat).classList.add("active");
document.getElementById("labelCat").textContent = curCat.toUpperCase();

const audio = new Audio();
let curIdx = 0;

const listTable = document.getElementById("listTable");
curList.forEach((song, i) => {
  const tr = document.createElement("tr");
  tr.innerHTML = `<td>${song.title}</td>`;
  tr.onclick = () => playSong(i);
  listTable.appendChild(tr);
});

function playSong(i) {
  curIdx = i;
  audio.src = curList[i].url;
  audio.play().catch(e => console.log("Play blocked"));
  document.getElementById("labelTitle").textContent = curList[i].title;
  updateUI();
}

function togglePlay() {
  if (!audio.src) { playSong(0); return; }
  audio.paused ? audio.play() : audio.pause();
}

function updateUI() {
  const rows = document.querySelectorAll("#listTable tr");
  rows.forEach((row, k) => row.classList.toggle("active", k === curIdx));
  rows[curIdx]?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

audio.onplay = () => {
  document.getElementById("btnPlay").textContent = "⏸";
  document.querySelectorAll(".bar").forEach(b => b.classList.add("playing"));
};
audio.onpause = () => {
  document.getElementById("btnPlay").textContent = "▶";
  document.querySelectorAll(".bar").forEach(b => b.classList.remove("playing"));
};
audio.onended = () => document.getElementById("btnNext").click();
audio.ontimeupdate = () => {
  if (audio.duration) {
    const per = (audio.currentTime / audio.duration) * 100;
    document.getElementById("progFill").style.width = per + "%";
  }
};

document.getElementById("btnPlay").onclick = togglePlay;
document.getElementById("btnNext").onclick = () => playSong((curIdx + 1) % curList.length);
document.getElementById("btnPrev").onclick = () => playSong((curIdx - 1 + curList.length) % curList.length);
document.getElementById("progArea").onclick = (e) => {
  const w = document.getElementById("progArea").clientWidth;
  audio.currentTime = (e.offsetX / w) * audio.duration;
};
</script>
</body>
</html>
